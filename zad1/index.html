<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sklep: dla ubranych</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>

    <header class="top-bar">
      <h1>Sklep: dla ubranych</h1>
      <nav class="nav-buttons">
        <button class="btn">Logowanie</button>
        <button class="btn">Koszyk</button>
      </nav>
    </header>

    <main class="container">
      
      <aside class="sidebar">
        <section class="card">
          <h2>Filtry</h2>
          <form class="form-layout">
            <label for="category">Kategoria:</label>
            <select id="category" name="category">
              <option value="clothing">Ubrania</option>
              <option value="shoes">Obuwie</option>
              <option value="accessories">Akcesoria</option>
            </select>

            <label for="price-range">Zakres cen:</label>
            <input type="range" id="price-range" name="price-range" min="0" max="500" />

            <button type="submit" class="btn btn-success">Zastosuj filtry</button>
          </form>
        </section>

        <section class="card">
          <h2>Dodaj produkt</h2>
          <form class="form-layout">
            <label for="product-name">Nazwa produktu:</label>
            <input type="text" id="product-name" name="product-name" required />

            <label for="product-price">Cena (PLN):</label>
            <input type="number" id="product-price" name="product-price" required />

            <button type="submit" class="btn btn-success">Dodaj produkt</button>
          </form>
        </section>
      </aside>

      <section class="results">
        <h2>Wyniki wyszukiwania</h2>
        <div class="products-grid">
          
          <article class="card">
            <h3>Koszula</h3>
            <p>Cena: 99 PLN</p>
            <button class="btn">Dodaj do koszyka</button>
            <a href="index2.html" class="btn">Szczegóły</a>
          </article>
          
          <article class="card">
            <h3>Spodnie</h3>
            <p>Cena: 149 PLN</p>
            <button class="btn">Dodaj do koszyka</button>
          </article>
          
          <article class="card">
            <h3>Buty</h3>
            <p>Cena: 199 PLN</p>
            <button class="btn">Dodaj do koszyka</button>
          </article>

        </div>
      </section>

    </main>

    <footer>
      <p>&copy; 2026 Sklep dla ubranych</p>
    </footer>

  </body>
</html>
